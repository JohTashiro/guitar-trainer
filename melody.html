<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Sequencer & Analyzer</title>
    <style>
        body { font-family: sans-serif; background: #f5f5f7; padding: 20px; color: #333; margin: 0; }
        .app-container { max-width: 1100px; margin: 0 auto; background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { font-size: 1.2rem; margin-top: 0; color: #0071e3; border-bottom: 1px solid #e5e5e5; padding-bottom: 8px; }
        
        .control-panel { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; background: #f5f5f7; padding: 10px 15px; border-radius: 8px; }
        .panel-label { font-size: 0.85rem; font-weight: bold; color: #555; }
        
        .switch-btn { padding: 6px 14px; font-size: 0.8rem; font-weight: bold; border: 2px solid #8e8e93; border-radius: 20px; background: white; color: #555; cursor: pointer; transition: all 0.2s; }
        .switch-btn.active { border-color: #0071e3; background: #0071e3; color: white; }

        /* フルサイズ指板 */
        .fretboard-wrapper { overflow-x: auto; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; background: #fff; }
        .fretboard { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 800px; }
        .fretboard th, .fretboard td { border: 1px solid #ccc; padding: 6px 4px; text-align: center; cursor: pointer; position: relative; min-width: 32px; height: 35px; box-sizing: border-box; }
        .fretboard th { background: #f2f2f2; cursor: default; font-weight: bold; }
        
        .fretboard td.dot-fret, .fretboard th.dot-fret { background-color: #f9f9f9; }
        .fretboard td.double-dot-fret, .fretboard th.double-dot-fret { background-color: #eef5fc; }

        .fretboard td:first-child, .fretboard th:first-child { background-color: #f2f2f2; font-weight: bold; position: sticky; left: 0; z-index: 10; cursor: default; width: 60px; min-width: 60px; }
        .fretboard td:hover:not(:first-child) { background: #e6f2ff; }
        
        /* 一回使われたことのある音 */
        td.used-fret { border: 2px solid var(--note-color) !important; }
        td.used-fret::after {
            content: ''; position: absolute; bottom: 2px; left: calc(50% - 3px);
            width: 6px; height: 6px; border-radius: 50%; background-color: var(--note-color); opacity: 0.7;
        }

        /* 再生中・クリック連動時の黒ハイライト */
        td.playing-now {
            background-color: #222 !important;
            color: #fff !important;
            font-weight: bold;
            box-shadow: inset 0 0 8px rgba(255,255,255,0.4);
            border: 2px solid var(--note-color) !important;
        }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        button, .file-input-label { padding: 10px 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; display: inline-block; box-sizing: border-box; }
        .btn-primary { background: #0071e3; color: white; }
        .btn-play { background: #ff9500; color: white; }
        .btn-stop { background: #ff3b30; color: white; } /* 停止ボタン用 */
        .btn-warning { background: #5ac8fa; color: white; }
        .btn-secondary { background: #34c759; color: white; }
        .btn-danger { background: #ff3b30; color: white; }
        
        input[type="file"] { display: none; }
        
        /* ★分析パネルのスタイル */
        .analysis-panel { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .analysis-card { flex: 1; min-width: 240px; background: #f5f5f7; padding: 14px; border-radius: 10px; border: 1px solid #e5e5e5; }
        .analysis-card h3 { margin: 0 0 6px 0; font-size: 0.85rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .analysis-value { font-size: 1.3rem; font-weight: bold; color: #222; }
        .analysis-sub { font-size: 0.75rem; color: #8e8e93; margin-top: 4px; }

        /* グラフエリア */
        .chart-wrapper { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px; text-align: center; }
        canvas { background: white; border: 1px solid #d1d1d6; width: 100%; height: 260px; cursor: pointer; }
        
        .log-view { margin-top: 15px; font-family: monospace; background: #222; color: #34c759; padding: 10px; border-radius: 6px; font-size: 0.8rem; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>1. 指板レンジ設定 & メロディ入力</h2>
    
    <div class="control-panel">
        <span class="panel-label">表示フレット数:</span>
        <button id="range-12" class="switch-btn" onclick="switchFretRange(12)">12フレット</button>
        <button id="range-24" class="switch-btn active" onclick="switchFretRange(24)">24フレット</button>
    </div>

    <div class="fretboard-wrapper">
        <table class="fretboard">
            <thead id="fretboard-head"></thead>
            <tbody id="fretboard-body"></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn-play" id="playBtn" onclick="togglePlayStop()">▶ メロディを流す</button>
        <button class="btn-warning" id="undoBtn" onclick="undoLastNote()">↩ 1個戻る</button>
        <button class="btn-primary" id="exportBtn" onclick="exportMelody()">JSONとしてエクスポート</button>
        <label class="file-input-label btn-secondary" id="importLabel">JSONをインポート
            <input type="file" id="importFile" accept=".json" onchange="importMelody(event)">
        </label>
        <button class="btn-danger" id="clearBtn" onclick="clearMelody()">リセット</button>
    </div>

    <h2>2. メロディの音楽的距離・音域分析</h2>
    <div class="analysis-panel">
        <div class="analysis-card">
            <h3>現在の2音間の距離 (インターバル)</h3>
            <div class="analysis-value" id="interval-value">-</div>
            <div class="analysis-sub" id="interval-sub">前のステップの音からの音程の離れ度合い</div>
        </div>
        <div class="analysis-card">
            <h3>メロディ全体の距離 (総音域幅)</h3>
            <div class="analysis-value" id="range-value">-</div>
            <div class="analysis-sub" id="range-sub">このシーケンスの最低音から最高音までの幅</div>
        </div>
    </div>

    <h2>3. メロディラインの可視化 (タイムラインクリックでシークバー移動)</h2>
    <div class="chart-wrapper">
        <canvas id="melodyChart" width="1000" height="260"></canvas>
    </div>

    <div class="log-view" id="logView">現在のシーケンス: []</div>
</div>

<script>
    const noteColors = {
        "A": "#FF3B30", "A#": "#FF9500", "Bb": "#FF9500", "A#/Bb": "#FF9500", "B": "#FFCC00", "C": "#34C759", 
        "C#": "#00C7BE", "Db": "#00C7BE", "C#/Db": "#00C7BE", "D": "#0071e3", "D#": "#5856D6", "Eb": "#5856D6", 
        "D#/Eb": "#5856D6", "E": "#AF52DE", "F": "#FF2D55", "F#": "#A2845E", "Gb": "#A2845E", "F#/Gb": "#A2845E", 
        "G": "#5AC8FA", "G#": "#8E8E93", "Ab": "#8E8E93", "G#/Ab": "#8E8E93"
    };

    const tuningInfo = {
        1: { label: "1弦 (E)", basePitch: 24, startNoteIdx: 4 },
        2: { label: "2弦 (B)", basePitch: 19, startNoteIdx: 11 },
        3: { label: "3弦 (G)", basePitch: 15, startNoteIdx: 7 },
        4: { label: "4弦 (D)", basePitch: 10, startNoteIdx: 2 },
        5: { label: "5弦 (A)", basePitch: 5,  startNoteIdx: 9 },
        6: { label: "6弦 (E)", basePitch: 0,  startNoteIdx: 4 }
    };
    const chromaticScale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    let melodySequence = [];
    let isPlaying = false;
    let currentPlayIndex = 0; 
    let maxFretRange = 24;
    let playTimer = null; // setTimeoutのコントロール用

    const canvas = document.getElementById('melodyChart');
    const ctx = canvas.getContext('2d');
    let dotClickZones = [];

    buildFretboard();
    drawMelodyChart();

    canvas.addEventListener('click', handleCanvasClick);

    function buildFretboard() {
        const thead = document.getElementById('fretboard-head');
        const tbody = document.getElementById('fretboard-body');
        thead.innerHTML = ''; tbody.innerHTML = '';

        const trHead = document.createElement('tr');
        trHead.innerHTML = '<th>弦 \\ F</th>';
        for (let f = 0; f <= maxFretRange; f++) {
            let cls = "";
            if ([3, 5, 7, 9, 15, 17, 19, 21].includes(f)) cls = "dot-fret";
            if (f === 12 || f === 24) cls = "double-dot-fret";
            trHead.innerHTML += `<th class="${cls}">${f}</th>`;
        }
        thead.appendChild(trHead);

        for (let s = 1; s <= 6; s++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${tuningInfo[s].label}</td>`;
            let noteIdx = tuningInfo[s].startNoteIdx;
            for (let f = 0; f <= maxFretRange; f++) {
                let cls = "";
                if ([3, 5, 7, 9, 15, 17, 19, 21].includes(f)) cls = "dot-fret";
                if (f === 12 || f === 24) cls = "double-dot-fret";

                const noteName = chromaticScale[noteIdx];
                const td = document.createElement('td');
                td.className = cls; td.id = `cell-${s}-${f}`; td.innerText = noteName;
                td.style.setProperty('--note-color', noteColors[noteName] || '#333');
                td.onclick = (e) => handleFretClick(s, f, noteName);
                tr.appendChild(td);
                noteIdx = (noteIdx + 1) % 12;
            }
            tbody.appendChild(tr);
        }
        refreshFretboardMarks();
    }

    function switchFretRange(range) {
        if (isPlaying) return;
        maxFretRange = range;
        document.getElementById('range-12').classList.toggle('active', range === 12);
        document.getElementById('range-24').classList.toggle('active', range === 24);
        buildFretboard();
        drawMelodyChart();
    }

    function handleFretClick(stringNum, fret, noteName) {
        if (isPlaying) return;

        const pitchValue = tuningInfo[stringNum].basePitch + fret;
        const noteData = {
            step: melodySequence.length + 1,
            note: noteName,
            string: stringNum,
            fret: fret,
            pitch: pitchValue
        };

        melodySequence.push(noteData);
        currentPlayIndex = melodySequence.length - 1;
        updateUI();
        playBeep(164.81 * Math.pow(2, pitchValue / 12));
    }

    function undoLastNote() {
        if (isPlaying) return;
        if (melodySequence.length === 0) return;
        melodySequence.pop();
        currentPlayIndex = Math.max(0, melodySequence.length - 1);
        updateUI();
    }

    function handleCanvasClick(event) {
        if (isPlaying) return; 
        if (melodySequence.length === 0) return;

        const rect = canvas.getBoundingClientRect();
        const x = (event.clientX - rect.left) * (canvas.width / rect.width);
        const y = (event.clientY - rect.top) * (canvas.height / rect.height);

        for (let zone of dotClickZones) {
            const distance = Math.sqrt((x - zone.x) ** 2 + (y - zone.y) ** 2);
            if (distance <= zone.radius) {
                playBeep(164.81 * Math.pow(2, zone.pitch / 12));
                clearFretboardHighlights();
                const cell = document.getElementById(`cell-${zone.string}-${zone.fret}`);
                if (cell) {
                    cell.classList.add('playing-now');
                    setTimeout(() => { if (!isPlaying) { clearFretboardHighlights(); refreshFretboardMarks(); } }, 300);
                }
                currentPlayIndex = zone.index;
                updateUI(); // 距離分析を動かすためにUI全体をアップデート
                return;
            }
        }

        if (y >= 10 && y <= 35) {
            const padding = 40;
            const chartWidth = canvas.width - padding * 2;
            const stepCount = Math.max(melodySequence.length, 6);
            const xInterval = chartWidth / (stepCount - 1 || 1);

            let clickedIndex = Math.round((x - padding) / xInterval);
            if (clickedIndex < 0) clickedIndex = 0;
            if (clickedIndex >= melodySequence.length) clickedIndex = melodySequence.length - 1;

            currentPlayIndex = clickedIndex;
            updateUI();
        }
    }

    // ★再生と停止のトグル制御ロジック
    function togglePlayStop() {
        if (melodySequence.length === 0) return alert('メロディがありません。');

        if (isPlaying) {
            // 【停止処理】
            isPlaying = false;
            clearTimeout(playTimer);
            
            // ボタンの見た目を「再生可能」に戻す
            const playBtn = document.getElementById('playBtn');
            playBtn.innerText = "▶ メロディを流す";
            playBtn.className = "btn-play";
            
            // 他の操作ボタンのロックを解除
            setControlsDisabled(false);
            
            // 止まった場所のハイライトを指板とグラフに固定表示
            clearFretboardHighlights();
            const currentNote = melodySequence[currentPlayIndex];
            if (currentNote) {
                const targetCell = document.getElementById(`cell-${currentNote.string}-${currentNote.fret}`);
                if (targetCell) targetCell.classList.add('playing-now');
            }
            drawMelodyChart();
            calculateDistances();
        } else {
            // 【再生開始処理】
            // シークバーが曲の最後に達している場合は、自動で頭（0）に戻して再生開始
            if (currentPlayIndex >= melodySequence.length - 1 || currentPlayIndex < 0) {
                currentPlayIndex = 0;
            }

            isPlaying = true;
            const playBtn = document.getElementById('playBtn');
            playBtn.innerText = "■ 停止";
            playBtn.className = "btn-stop"; // 赤いスタイルへ移行
            
            setControlsDisabled(true);

            const playInterval = 500;

            function playNextStep() {
                if (!isPlaying) return; // 途中で停止ボタンが押されていたら即座に再帰を抜ける

                if (currentPlayIndex >= melodySequence.length) {
                    // ★最後まで完走した時：1番最初（0）に戻して停止状態にする
                    isPlaying = false;
                    currentPlayIndex = 0;
                    
                    playBtn.innerText = "▶ メロディを流す";
                    playBtn.className = "btn-play";
                    
                    setControlsDisabled(false);
                    clearFretboardHighlights();
                    updateUI();
                    return;
                }

                clearFretboardHighlights();
                const currentNote = melodySequence[currentPlayIndex];

                const targetCell = document.getElementById(`cell-${currentNote.string}-${currentNote.fret}`);
                if (targetCell) targetCell.classList.add('playing-now');

                drawMelodyChart();
                calculateDistances(); // 再生中もリアルタイムに距離を変動させる
                playBeep(164.81 * Math.pow(2, currentNote.pitch / 12));

                currentPlayIndex++;
                playTimer = setTimeout(playNextStep, playInterval);
            }
            playNextStep();
        }
    }

    // 再生中のボタン誤操作ロック用
    function setControlsDisabled(disabled) {
        document.getElementById('undoBtn').disabled = disabled;
        document.getElementById('exportBtn').disabled = disabled;
        document.getElementById('clearBtn').disabled = disabled;
        document.getElementById('importFile').disabled = disabled;
        if(disabled) {
            document.getElementById('importLabel').style.opacity = "0.5";
            document.getElementById('importLabel').style.pointerEvents = "none";
        } else {
            document.getElementById('importLabel').style.opacity = "1";
            document.getElementById('importLabel').style.pointerEvents = "auto";
        }
    }

    // ★音楽的距離の計算ロジック
    function calculateDistances() {
        const intervalVal = document.getElementById('interval-value');
        const rangeVal = document.getElementById('range-value');

        if (melodySequence.length === 0) {
            intervalVal.innerText = "-";
            rangeVal.innerText = "-";
            return;
        }

        // 1. 2音間の距離（現在のシークバー位置とその1つ前の差）
        if (currentPlayIndex > 0 && currentPlayIndex < melodySequence.length) {
            const currentPitch = melodySequence[currentPlayIndex].pitch;
            const prevPitch = melodySequence[currentPlayIndex - 1].pitch;
            const diff = currentPitch - prevPitch;
            
            if (diff === 0) {
                intervalVal.innerText = "±0 (同音)";
            } else {
                const direction = diff > 0 ? "↑" : "↓";
                intervalVal.innerText = `${direction} ${Math.abs(diff)} 半音`;
            }
        } else {
            intervalVal.innerText = "最初の音です";
        }

        // 2. メロディ全体の総音域幅（最低ピッチと最高ピッチの差）
        const pitches = melodySequence.map(item => item.pitch);
        const maxPitch = Math.max(...pitches);
        const minPitch = Math.min(...pitches);
        const totalRange = maxPitch - minPitch;

        rangeVal.innerText = `${totalRange} 半音幅`;
        document.getElementById('range-sub').innerText = `最低音: ${melodySequence.find(i=>i.pitch===minPitch).note}  /  最高音: ${melodySequence.find(i=>i.pitch===maxPitch).note}`;
    }

    function updateUI() {
        updateLog();
        refreshFretboardMarks();
        drawMelodyChart();
        calculateDistances();
    }

    function refreshFretboardMarks() {
        document.querySelectorAll('.fretboard td').forEach(td => td.classList.remove('used-fret'));
        melodySequence.forEach(item => {
            const targetCell = document.getElementById(`cell-${item.string}-${item.fret}`);
            if (targetCell) targetCell.classList.add('used-fret');
        });
    }

    function clearFretboardHighlights() {
        document.querySelectorAll('.fretboard td').forEach(td => td.classList.remove('playing-now'));
    }

    function exportMelody() {
        if (melodySequence.length === 0) return alert('メロディが空です！');
        const jsonString = JSON.stringify(melodySequence, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'guitar_melody.json'; a.click();
        URL.revokeObjectURL(url);
    }

    function importMelody(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (!Array.isArray(importedData)) throw new Error('配列形式ではありません。');
                melodySequence = importedData;
                currentPlayIndex = 0; 
                updateUI();
            } catch (err) { alert('読み込みエラー: ' + err.message); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function clearMelody() {
        if (isPlaying) return;
        melodySequence = [];
        currentPlayIndex = 0;
        updateUI();
    }

    function updateLog() {
        document.getElementById('logView').innerText = "現在のシーケンス: \n" + JSON.stringify(melodySequence, null, 2);
    }

    function drawEmptyChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#999'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('指板をクリックするか、JSONをインポートしてください', canvas.width / 2, 150);
    }

    function drawMelodyChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dotClickZones = []; 

        const padding = 40;
        const timelineTop = 10;
        const timelineHeight = 25;
        const chartTop = 55; 
        const chartWidth = canvas.width - padding * 2;
        const chartHeight = canvas.height - chartTop - padding;

        const stepCount = Math.max(melodySequence.length, 6);
        const xInterval = chartWidth / (stepCount - 1 || 1);
        const maxPitchRange = 48;

        // 1. 上部長方形タイムライン
        ctx.fillStyle = '#f5f5f7';
        ctx.fillRect(padding, timelineTop, chartWidth, timelineHeight);
        ctx.strokeStyle = '#8e8e93';
        ctx.lineWidth = 1;
        ctx.strokeRect(padding, timelineTop, chartWidth, timelineHeight);

        for (let i = 0; i < stepCount; i++) {
            const x = padding + i * xInterval;
            ctx.beginPath(); ctx.strokeStyle = '#d1d1d6';
            ctx.moveTo(x, timelineTop); ctx.lineTo(x, timelineTop + timelineHeight); ctx.stroke();

            ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(i + 1, x, timelineTop + 17);
        }

        if (melodySequence.length === 0) return drawEmptyChart();

        // 2. ガイド線
        ctx.beginPath();
        ctx.strokeStyle = '#e5e5ea'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
        melodySequence.forEach((item, index) => {
            const x = padding + index * xInterval;
            const y = chartTop + chartHeight - (item.pitch / maxPitchRange) * chartHeight;
            if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // 3. 音名ドット (指定カラー同期)
        melodySequence.forEach((item, index) => {
            const x = padding + index * xInterval;
            const y = chartTop + chartHeight - (item.pitch / maxPitchRange) * chartHeight;
            const dotColor = noteColors[item.note] || '#333';
            const radius = 7;

            dotClickZones.push({
                x: x, y: y, radius: radius + 5, 
                pitch: item.pitch, string: item.string, fret: item.fret, index: index
            });

            ctx.beginPath();
            ctx.arc(x, y, radius, 0, 2 * Math.PI);
            ctx.fillStyle = dotColor;
            ctx.fill();

            if (index === currentPlayIndex) {
                ctx.beginPath();
                ctx.arc(x, y, radius + 4, 0, 2 * Math.PI);
                ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();
            }

            ctx.fillStyle = '#333'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`${item.note}(${item.string}F)`, x, y - 13);
        });

        // 4. シークバー (縦線)
        if (currentPlayIndex >= 0 && currentPlayIndex < melodySequence.length) {
            const currentX = padding + currentPlayIndex * xInterval;
            ctx.beginPath();
            ctx.strokeStyle = isPlaying ? 'rgba(255, 59, 48, 0.7)' : 'rgba(0, 113, 227, 0.6)'; 
            ctx.lineWidth = 3;
            ctx.moveTo(currentX, timelineTop);
            ctx.lineTo(currentX, chartTop + chartHeight);
            ctx.stroke();
        }
    }

    function playBeep(freq) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
</script>

</body>
</html>
