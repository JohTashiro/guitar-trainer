<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Sequencer & Analyzer (Professional Edition)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f11; padding: 20px; color: #e5e5ea; margin: 0; }
        .app-container { max-width: 1200px; margin: 0 auto; background: #1c1c1e; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 1.1rem; margin-top: 0; color: #0a84ff; border-bottom: 1px solid #2c2c2e; padding-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
        
        /* 音名カラーインジケータ（上部トップパネル） */
        .color-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; background: #2c2c2e; padding: 12px; border-radius: 8px; justify-content: center; }
        .legend-badge { padding: 6px 12px; font-size: 0.75rem; font-weight: bold; border-radius: 6px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.6); min-width: 50px; text-align: center; }

        /* コントロールエリア */
        .control-panel { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; background: #2c2c2e; padding: 10px 15px; border-radius: 8px; }
        .panel-label { font-size: 0.85rem; font-weight: bold; color: #aeaea3; }
        
        /* 表示範囲切り替えスイッチ */
        .switch-btn { padding: 6px 14px; font-size: 0.8rem; font-weight: bold; border: 1px solid #48484a; border-radius: 20px; background: #3a3a3c; color: #d1d1d6; cursor: pointer; transition: all 0.2s; }
        .switch-btn.active { border-color: #0a84ff; background: #0a84ff; color: white; }

        /* フルサイズ指板 */
        .fretboard-wrapper { overflow-x: auto; margin-bottom: 25px; border: 1px solid #3a3a3c; border-radius: 8px; background: #1c1c1e; }
        .fretboard { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 900px; table-layout: fixed; }
        .fretboard th, .fretboard td { border: 1px solid #2c2c2e; padding: 8px 2px; text-align: center; cursor: pointer; position: relative; height: 38px; box-sizing: border-box; }
        .fretboard th { background: #2c2c2e; color: #aeaeae; cursor: default; font-weight: bold; }
        
        /* ポジションマークのドット表現背景 */
        .fretboard td.dot-fret, .fretboard th.dot-fret { background-color: #242426; }
        .fretboard td.double-dot-fret, .fretboard th.double-dot-fret { background-color: #2a2d35; }

        /* 弦番号・開放弦列の固定 */
        .fretboard td:first-child, .fretboard th:first-child { background-color: #2c2c2e; color: #fff; font-weight: bold; position: sticky; left: 0; z-index: 10; cursor: default; width: 75px; min-width: 75px; }
        .fretboard td:hover:not(:first-child) { background: #3a3a3c; }
        
        /* 過去に入力履歴のあるフレット */
        td.used-fret { border: 2px solid var(--note-color) !important; }
        td.used-fret::after {
            content: ''; position: absolute; bottom: 3px; left: calc(50% - 3px);
            width: 6px; height: 6px; border-radius: 50%; background-color: var(--note-color); opacity: 0.8;
        }

        /* 再生中・クリック時の黒ベース強調ハイライト */
        td.playing-now {
            background-color: #fff !important; color: #000 !important; font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8); border: 2px solid var(--note-color) !important;
        }
        
        /* 下部トランスポート・コントロール群 */
        .btn-group { display: flex; gap: 10px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; justify-content: center; background: #2c2c2e; padding: 12px; border-radius: 10px; }
        button, .file-input-label { padding: 10px 18px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: inline-block; box-sizing: border-box; transition: background 0.2s; }
        .btn-play { background: #34c759; color: white; }
        .btn-stop { background: #ff3b30; color: white; }
        .btn-warning { background: #5ac8fa; color: #1c1c1e; }
        .btn-primary { background: #0a84ff; color: white; }
        .btn-secondary { background: #8e8e93; color: white; }
        .btn-danger { background: #ff453a; color: white; }
        button:disabled, .file-input-label.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        
        input[type="file"] { display: none; }
        
        /* グラフエリア */
        .chart-wrapper { background: #151517; border: 1px solid #2c2c2e; border-radius: 12px; padding: 12px; text-align: center; box-shadow: inset 0 4px 15px rgba(0,0,0,0.5); }
        canvas { background: #111112; border: 1px solid #2c2c2e; width: 100%; height: 320px; cursor: pointer; border-radius: 6px; }
        
        .log-view { margin-top: 15px; font-family: monospace; background: #000; color: #30d158; padding: 12px; border-radius: 6px; font-size: 0.8rem; max-height: 100px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; border: 1px solid #2c2c2e; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="color-legend" id="colorLegend"></div>

    <h2>1. フレットレンジ設定 & 指板入力ベース</h2>
    <div class="control-panel">
        <span class="panel-label">表示フレット数:</span>
        <button id="range-12" class="switch-btn" onclick="switchFretRange(12)">12フレット</button>
        <button id="range-24" class="switch-btn active" onclick="switchFretRange(24)">24フレット (フルスケール)</button>
    </div>

    <div class="fretboard-wrapper">
        <table class="fretboard">
            <thead id="fretboard-head"></thead>
            <tbody id="fretboard-body"></tbody>
        </table>
    </div>

    <div class="btn-group">
        <button class="btn-play" id="playBtn" onclick="togglePlayStop()">▶ メロディを流す</button>
        <button class="btn-warning" id="undoBtn" onclick="undoLastNote()">↩ 1個戻る</button>
        <button class="btn-primary" id="exportBtn" onclick="exportMelody()">JSONとしてエクスポート</button>
        <label class="file-input-label btn-secondary" id="importLabel">JSONをインポート
            <input type="file" id="importFile" accept=".json" onchange="importMelody(event)">
        </label>
        <button class="btn-danger" id="clearBtn" onclick="clearMelody()">リセット</button>
    </div>

    <h2>2. メロディラインの可視化 (C2～C5ベース＆人間歌唱可能音域オーバーレイ)</h2>
    <div class="chart-wrapper">
        <canvas id="melodyChart" width="1050" height="340"></canvas>
    </div>

    <div class="log-view" id="logView">現在のシーケンス: []</div>
</div>

<script>
    // 指定された美しいApple準拠カラーパレット
    const noteColors = {
        "A": "#FF3B30", "A#": "#FF9500", "Bb": "#FF9500", "A#/Bb": "#FF9500", "B": "#FFCC00", "C": "#34C759", 
        "C#": "#00C7BE", "Db": "#00C7BE", "C#/Db": "#00C7BE", "D": "#0071e3", "D#": "#5856D6", "Eb": "#5856D6", 
        "D#/Eb": "#5856D6", "E": "#AF52DE", "F": "#FF2D55", "F#": "#A2845E", "Gb": "#A2845E", "F#/Gb": "#A2845E", 
        "G": "#5AC8FA", "G#": "#8E8E93", "Ab": "#8E8E93", "G#/Ab": "#8E8E93"
    };

    // レギュラーチューニング情報。6弦開放Eを絶対値「4」とする（C2を基準0にするため調整）
    const tuningInfo = {
        1: { label: "1弦 (E)", basePitch: 28, startNoteIdx: 4 }, // E4
        2: { label: "2弦 (B)", basePitch: 23, startNoteIdx: 11 },// B3
        3: { label: "3弦 (G)", basePitch: 19, startNoteIdx: 7 }, // G3
        4: { label: "4弦 (D)", basePitch: 14, startNoteIdx: 2 }, // D3
        5: { label: "5弦 (A)", basePitch: 9,  startNoteIdx: 9 }, // A2
        6: { label: "6弦 (E)", basePitch: 4,  startNoteIdx: 4 }  // E2
    };
    const chromaticScale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    let melodySequence = [];
    let isPlaying = false;
    let currentPlayIndex = 0; 
    let maxFretRange = 24;
    let playTimer = null; 

    const canvas = document.getElementById('melodyChart');
    const ctx = canvas.getContext('2d');
    let dotClickZones = [];

    // 初期起動処理
    renderColorLegend();
    buildFretboard();
    drawMelodyChart();

    canvas.addEventListener('click', handleCanvasClick);

    // 凡例パレットの生成
    function renderColorLegend() {
        const legend = document.getElementById('colorLegend');
        const uniqueNotes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        uniqueNotes.forEach(note => {
            const badge = document.createElement('div');
            badge.className = 'legend-badge';
            badge.style.backgroundColor = noteColors[note];
            badge.innerText = note;
            legend.appendChild(badge);
        });
    }

    function buildFretboard() {
        const thead = document.getElementById('fretboard-head');
        const tbody = document.getElementById('fretboard-body');
        thead.innerHTML = ''; tbody.innerHTML = '';

        const trHead = document.createElement('tr');
        trHead.innerHTML = '<th>弦 \\ F</th>';
        for (let f = 0; f <= maxFretRange; f++) {
            let cls = "";
            if ([3, 5, 7, 9, 15, 17, 19, 21].includes(f)) cls = "dot-fret";
            if (f === 12 || f === 24) cls = "double-dot-fret";
            trHead.innerHTML += `<th class="${cls}">${f}</th>`;
        }
        thead.appendChild(trHead);

        for (let s = 1; s <= 6; s++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${tuningInfo[s].label}</td>`;
            let noteIdx = tuningInfo[s].startNoteIdx;
            for (let f = 0; f <= maxFretRange; f++) {
                let cls = "";
                if ([3, 5, 7, 9, 15, 17, 19, 21].includes(f)) cls = "dot-fret";
                if (f === 12 || f === 24) cls = "double-dot-fret";

                const noteName = chromaticScale[noteIdx];
                const td = document.createElement('td');
                td.className = cls; td.id = `cell-${s}-${f}`; td.innerText = noteName;
                td.style.setProperty('--note-color', noteColors[noteName] || '#333');
                td.onclick = (e) => handleFretClick(s, f, noteName);
                tr.appendChild(td);
                noteIdx = (noteIdx + 1) % 12;
            }
            tbody.appendChild(tr);
        }
        refreshFretboardMarks();
    }

    function switchFretRange(range) {
        if (isPlaying) return;
        maxFretRange = range;
        document.getElementById('range-12').classList.toggle('active', range === 12);
        document.getElementById('range-24').classList.toggle('active', range === 24);
        buildFretboard();
        drawMelodyChart();
    }

    function handleFretClick(stringNum, fret, noteName) {
        if (isPlaying) return;

        const pitchValue = tuningInfo[stringNum].basePitch + fret;
        const noteData = {
            step: melodySequence.length + 1,
            note: noteName,
            string: stringNum,
            fret: fret,
            pitch: pitchValue
        };

        melodySequence.push(noteData);
        currentPlayIndex = melodySequence.length - 1;
        updateUI();
        playBeep(65.41 * Math.pow(2, pitchValue / 12)); // C2ベース発音
    }

    function undoLastNote() {
        if (isPlaying) return;
        if (melodySequence.length === 0) return;
        melodySequence.pop();
        currentPlayIndex = Math.max(0, melodySequence.length - 1);
        updateUI();
    }

    function handleCanvasClick(event) {
        if (isPlaying) return; 
        if (melodySequence.length === 0) return;

        const rect = canvas.getBoundingClientRect();
        const x = (event.clientX - rect.left) * (canvas.width / rect.width);
        const y = (event.clientY - rect.top) * (canvas.height / rect.height);

        // 音名ドットのクリック当たり判定
        for (let zone of dotClickZones) {
            const distance = Math.sqrt((x - zone.x) ** 2 + (y - zone.y) ** 2);
            if (distance <= zone.radius) {
                playBeep(65.41 * Math.pow(2, zone.pitch / 12));
                clearFretboardHighlights();
                const cell = document.getElementById(`cell-${zone.string}-${zone.fret}`);
                if (cell) {
                    cell.classList.add('playing-now');
                    setTimeout(() => { if (!isPlaying) { clearFretboardHighlights(); refreshFretboardMarks(); } }, 350);
                }
                currentPlayIndex = zone.index;
                updateUI();
                return;
            }
        }

        // 上部タイムライン枠（Y座標: 10px 〜 45px）をクリックした時のシーク移動
        if (y >= 10 && y <= 45) {
            const padding = 50;
            const chartWidth = canvas.width - padding * 2;
            const stepCount = Math.max(melodySequence.length, 8);
            const xInterval = chartWidth / (stepCount - 1 || 1);

            let clickedIndex = Math.round((x - padding) / xInterval);
            if (clickedIndex < 0) clickedIndex = 0;
            if (clickedIndex >= melodySequence.length) clickedIndex = melodySequence.length - 1;

            currentPlayIndex = clickedIndex;
            updateUI();
        }
    }

    function togglePlayStop() {
        if (melodySequence.length === 0) return alert('メロディがありません。');

        if (isPlaying) {
            isPlaying = false;
            clearTimeout(playTimer);
            const playBtn = document.getElementById('playBtn');
            playBtn.innerText = "▶ メロディを流す";
            playBtn.className = "btn-play";
            setControlsDisabled(false);
            clearFretboardHighlights();
            const currentNote = melodySequence[currentPlayIndex];
            if (currentNote) {
                const targetCell = document.getElementById(`cell-${currentNote.string}-${currentNote.fret}`);
                if (targetCell) targetCell.classList.add('playing-now');
            }
            drawMelodyChart();
        } else {
            if (currentPlayIndex >= melodySequence.length - 1 || currentPlayIndex < 0) {
                currentPlayIndex = 0;
            }

            isPlaying = true;
            const playBtn = document.getElementById('playBtn');
            playBtn.innerText = "■ 停止";
            playBtn.className = "btn-stop";
            setControlsDisabled(true);

            const playInterval = 600; // じっくり確認できるようややゆっくりに調整

            function playNextStep() {
                if (!isPlaying) return;

                if (currentPlayIndex >= melodySequence.length) {
                    // 【完走時】1番最初に戻してトランスポート停止
                    isPlaying = false;
                    currentPlayIndex = 0;
                    playBtn.innerText = "▶ メロディを流す";
                    playBtn.className = "btn-play";
                    setControlsDisabled(false);
                    clearFretboardHighlights();
                    updateUI();
                    return;
                }

                clearFretboardHighlights();
                const currentNote = melodySequence[currentPlayIndex];

                const targetCell = document.getElementById(`cell-${currentNote.string}-${currentNote.fret}`);
                if (targetCell) targetCell.classList.add('playing-now');

                drawMelodyChart();
                playBeep(65.41 * Math.pow(2, currentNote.pitch / 12));

                currentPlayIndex++;
                playTimer = setTimeout(playNextStep, playInterval);
            }
            playNextStep();
        }
    }

    function setControlsDisabled(disabled) {
        document.getElementById('undoBtn').disabled = disabled;
        document.getElementById('exportBtn').disabled = disabled;
        document.getElementById('clearBtn').disabled = disabled;
        document.getElementById('importFile').disabled = disabled;
        const label = document.getElementById('importLabel');
        if(disabled) {
            label.classList.add('disabled');
        } else {
            label.classList.remove('disabled');
        }
    }

    function updateUI() {
        updateLog();
        refreshFretboardMarks();
        drawMelodyChart();
    }

    function refreshFretboardMarks() {
        document.querySelectorAll('.fretboard td').forEach(td => td.classList.remove('used-fret'));
        melodySequence.forEach(item => {
            const targetCell = document.getElementById(`cell-${item.string}-${item.fret}`);
            if (targetCell) targetCell.classList.add('used-fret');
        });
    }

    function clearFretboardHighlights() {
        document.querySelectorAll('.fretboard td').forEach(td => td.classList.remove('playing-now'));
    }

    // クオリティの高いプロフェッショナルなCanvas描画
    function drawMelodyChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dotClickZones = []; 

        const padding = 50;
        const timelineTop = 10;
        const timelineHeight = 35;
        const chartTop = 70; 
        const chartWidth = canvas.width - padding * 2;
        const chartHeight = canvas.height - chartTop - padding;

        const stepCount = Math.max(melodySequence.length, 8);
        const xInterval = chartWidth / (stepCount - 1 || 1);

        // Y軸の設定: C2(基準0) から C5(36) までの範囲にプロット（ギターの24F最高音域を考慮し上限を48に設定）
        const maxPitchRange = 44; 

        // --- 1. タイムライン・ヘッダー（画像準拠デザイン） ---
        ctx.fillStyle = '#2c2c2e';
        ctx.fillRect(padding, timelineTop, chartWidth, timelineHeight);
        ctx.strokeStyle = '#48484a';
        ctx.lineWidth = 1;
        ctx.strokeRect(padding, timelineTop, chartWidth, timelineHeight);

        for (let i = 0; i < stepCount; i++) {
            const x = padding + i * xInterval;
            ctx.beginPath(); ctx.strokeStyle = '#3a3a3c';
            ctx.moveTo(x, timelineTop); ctx.lineTo(x, timelineTop + timelineHeight); ctx.stroke();

            // ステップ数刻み
            ctx.fillStyle = '#aeaea3'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(i + 1, x, timelineTop + 14);

            // 2音間の距離（半音数）をタイムライン上部バーにマッピング
            if (i > 0 && i < melodySequence.length) {
                const diff = melodySequence[i].pitch - melodySequence[i-1].pitch;
                ctx.font = '9px monospace';
                if (diff === 0) {
                    ctx.fillStyle = '#8e8e93'; ctx.fillText('±0', x - (xInterval/2), timelineTop + 28);
                } else {
                    ctx.fillStyle = diff > 0 ? '#30d158' : '#ff453a';
                    ctx.fillText((diff > 0 ? '+' : '') + diff, x - (xInterval/2), timelineTop + 28);
                }
            }
        }

        // --- 2. バックグラウンド音域ガイド ＆ 「歌う範囲（Human Singing Range）」の再現 ---
        // C2からC5までのノートラインのY座標をマッピング
        const yC2 = chartTop + chartHeight - (0 / maxPitchRange) * chartHeight;
        const yC3 = chartTop + chartHeight - (12 / maxPitchRange) * chartHeight;
        const yC4 = chartTop + chartHeight - (24 / maxPitchRange) * chartHeight;
        const yC5 = chartTop + chartHeight - (36 / maxPitchRange) * chartHeight;

        // 【歌う範囲】の薄青シェード（一般的な歌唱レンジ C3～G5付近をオーバーレイ表示）
        const yG5 = chartTop + chartHeight - (43 / maxPitchRange) * chartHeight;
        ctx.fillStyle = 'rgba(10, 132, 255, 0.08)';
        ctx.fillRect(padding, yG5, chartWidth, yC3 - yG5);

        // ガイドラベル
        ctx.fillStyle = 'rgba(10, 132, 255, 0.4)'; ctx.font = 'italic 11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Human Singing Range (C3 - G5) / 歌う範囲', canvas.width / 2, (yG5 + yC3)/2 + 4);

        // オクターブ区切りガイド線 (C2, C3, C4, C5)
        const labels = [{y: yC2, txt: "C2"}, {y: yC3, txt: "C3"}, {y: yC4, txt: "C4"}, {y: yC5, txt: "C5"}];
        labels.forEach(l => {
            ctx.beginPath(); ctx.strokeStyle = '#2c2c2e'; ctx.lineWidth = 1;
            ctx.moveTo(padding, l.y); ctx.lineTo(canvas.width - padding, l.y); ctx.stroke();
            ctx.fillStyle = '#8e8e93'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText(l.txt, padding - 8, l.y + 4);
        });

        if (melodySequence.length === 0) {
            ctx.fillStyle = '#666'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('指板をタップするか、JSONデータをロードしてシーケンスを開始してください', canvas.width / 2, chartTop + chartHeight / 2);
            return;
        }

        // --- 3. メロディのメイン接続ライン ＆ 傾きグラデーション ---
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 2; ctx.lineJoin = 'round';
        melodySequence.forEach((item, index) => {
            const x = padding + index * xInterval;
            const y = chartTop + chartHeight - (item.pitch / maxPitchRange) * chartHeight;
            if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // --- 4. 音名ドットのレンダリング ＆ ライン上への距離（度数テキスト）マッピング ---
        melodySequence.forEach((item, index) => {
            const x = padding + index * xInterval;
            const y = chartTop + chartHeight - (item.pitch / maxPitchRange) * chartHeight;
            const dotColor = noteColors[item.note] || '#fff';
            const radius = 7;

            dotClickZones.push({
                x: x, y: y, radius: radius + 6, 
                pitch: item.pitch, string: item.string, fret: item.fret, index: index
            });

            // 2音間の距離テキストをラインの「中間地点」に直接フローティングさせる
            if (index > 0) {
                const prevItem = melodySequence[index - 1];
                const prevX = padding + (index - 1) * xInterval;
                const prevY = chartTop + chartHeight - (prevItem.pitch / maxPitchRange) * chartHeight;
                
                const midX = (prevX + x) / 2;
                const midY = (prevY + y) / 2;
                const semitoneDiff = item.pitch - prevItem.pitch;

                // 音楽的度数(インターバル名)の簡易判定
                let intervalName = `${Math.abs(semitoneDiff)} semitones`;
                const absDiff = Math.abs(semitoneDiff);
                if (absDiff === 3) intervalName = "minor 3rd";
                if (absDiff === 4) intervalName = "major 3rd";
                if (absDiff === 5) intervalName = "perfect 4th";
                if (absDiff === 7) intervalName = "perfect 5th";
                if (absDiff === 12) intervalName = "1 Octave";

                const directionText = semitoneDiff > 0 ? "up ↗" : semitoneDiff < 0 ? "down ↘" : "unison ➔";

                ctx.fillStyle = semitoneDiff > 0 ? '#30d158' : semitoneDiff < 0 ? '#ff453a' : '#8e8e93';
                ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(`${intervalName} ${directionText}`, midX, midY - 8);
            }

            // ドット外円（固有色）
            ctx.beginPath(); ctx.arc(x, y, radius, 0, 2 * Math.PI);
            ctx.fillStyle = dotColor; ctx.fill();

            // 内側コア（デザイン性強化）
            ctx.beginPath(); ctx.arc(x, y, 3, 0, 2 * Math.PI);
            ctx.fillStyle = '#111112'; ctx.fill();

            if (index === currentPlayIndex) {
                ctx.beginPath(); ctx.arc(x, y, radius + 5, 0, 2 * Math.PI);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
            }

            // 音名キャプション
            ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`${item.note}(${item.string}G:${item.fret}F)`, x, y - 14);
        });

        // --- 5. インタラクティブ・シークバー（常時表示縦線） ---
        if (currentPlayIndex >= 0 && currentPlayIndex < melodySequence.length) {
            const currentX = padding + currentPlayIndex * xInterval;
            ctx.beginPath();
            ctx.strokeStyle = isPlaying ? 'rgba(52, 199, 89, 0.7)' : 'rgba(10, 132, 255, 0.8)'; 
            ctx.lineWidth = 2;
            ctx.moveTo(currentX, timelineTop);
            ctx.lineTo(currentX, chartTop + chartHeight);
            ctx.stroke();
        }
    }

    function playBeep(freq) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.45);
    }

    function exportMelody() {
        if (melodySequence.length === 0) return alert('メロディが空です！');
        const jsonString = JSON.stringify(melodySequence, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'melody_sequence.json'; a.click();
        URL.revokeObjectURL(url);
    }

    function importMelody(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (!Array.isArray(importedData)) throw new Error('配列形式ではありません。');
                melodySequence = importedData;
                currentPlayIndex = 0; 
                updateUI();
            } catch (err) { alert('読み込みエラー: ' + err.message); }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function clearMelody() {
        if (isPlaying) return;
        melodySequence = []; currentPlayIndex = 0;
        updateUI();
    }

    function updateLog() {
        document.getElementById('logView').innerText = "現在のシーケンス: \n" + JSON.stringify(melodySequence, null, 2);
    }
</script>

</body>
