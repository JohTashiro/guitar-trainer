<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ギター指板 フルレンジ・トレーナー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 95%;
            max-width: 1000px;
        }

        /* ヘッダーエリア */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        h1 {
            font-size: 1.3rem;
            color: #333;
            margin: 0;
        }
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        /* ボリュームスライダー */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
        }
        .volume-control input {
            width: 80px;
            cursor: pointer;
        }

        .mode-toggle-btn, .display-toggle-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 2px solid #0071e3;
            border-radius: 20px;
            background: white;
            color: #0071e3;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-toggle-btn:hover, .display-toggle-btn:hover {
            background: #f0f7ff;
        }
        /* 度数表示の時の特別色 */
        .display-toggle-btn.active {
            background: #f5a623;
            border-color: #f5a623;
            color: white;
        }

        /* 設定コントロールエリア */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .row-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .switch-btn {
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 2px solid #8e8e93;
            border-radius: 20px;
            background: white;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }
        .switch-btn.active {
            border-color: #0071e3;
            background: #0071e3;
            color: white;
        }

        /* チューニング・スケールセレクト */
        .select-custom {
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 2px solid #0071e3;
            border-radius: 6px;
            background: white;
            color: #333;
            cursor: pointer;
            outline: none;
        }

        /* スケールセレクトパネル */
        .scale-panel {
            display: none;
            background-color: #f0f7ff;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #b3d7ff;
        }

        /* 出題範囲設定パネル */
        .settings-panel {
            background-color: #f5f5f7;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #d1d1d6;
        }
        .settings-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 6px;
        }
        .checkbox-group {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .checkbox-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            background: white;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .display-area {
            min-height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            text-align: center;
        }
        .question {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0071e3;
        }
        .analyzer-instruction {
            font-size: 0.95rem;
            color: #666;
        }

        /* 指板テーブル */
        .fretboard-wrapper {
            overflow-x: auto;
            margin-bottom: 24px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 6px 2px;
            text-align: center;
            min-width: 32px;
            height: 34px;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        td:first-child, th:first-child {
            background-color: #f2f2f2;
            font-weight: bold;
            position: sticky;
            left: 0;
            z-index: 2;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        body.mode-analyzer td.fret-cell:hover {
            background-color: #eef7ff !important;
            cursor: pointer;
        }

        .dot-fret { background-color: #f9f9f9; }
        .double-dot-fret { background-color: #e5e5e5; }

        .extended-fret {
            display: none;
        }

        /* マーカー（丸） */
        .target-marker {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 30px;
            height: 30px;
            background-color: #0071e3;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.7rem;
            visibility: hidden;
            box-sizing: border-box;
            line-height: 1;
            pointer-events: none;
        }
        .target-marker span.octave {
            font-size: 0.45rem;
            opacity: 0.9;
            margin-top: 1px;
        }

        /* ルート音 (Root) の強調スタイル */
        .target-marker.root-note {
            background-color: #f5a623 !important;
            box-shadow: 0 0 10px rgba(245, 166, 35, 0.8);
            border: 2px solid #fff;
            transform: scale(1.1);
            z-index: 5;
        }

        .target-marker.visible-on {
            visibility: visible !important;
            animation: pop 0.15s ease-out;
        }
        .target-marker.dimmed {
            opacity: 0.2;
            transform: scale(0.85);
        }

        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        /* 12音ボタン */
        .choices-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        @media (max-width: 480px) {
            .choices-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .choice-btn {
            padding: 12px 4px;
            font-size: 0.95rem;
            font-weight: bold;
            background-color: #f0f0f2;
            color: #333;
            border: 2px solid #d1d1d6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn.correct {
            background-color: #34c759 !important;
            border-color: #34c759 !important;
            color: white;
        }
        .choice-btn.wrong {
            background-color: #ff3b30 !important;
            border-color: #ff3b30 !important;
            color: white;
            opacity: 0.6;
        }

        .control-btn-wrapper {
            text-align: center;
        }
        .control-btn {
            width: 100%;
            max-width: 300px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #0071e3;
            color: white;
        }
        .control-btn:hover { background-color: #005bb5; }

        /* ダイアトニックコードグリッド */
        .chord-grid {
            display: none;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) {
            .chord-grid { grid-template-columns: repeat(4, 1fr); }
        }
        .chord-btn {
            padding: 10px 4px;
            font-size: 0.85rem;
            font-weight: bold;
            background-color: #f0f0f2;
            color: #333;
            border: 2px solid #d1d1d6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
            text-align: center;
        }
        .chord-btn:hover { background-color: #e0e0e5; }
        .chord-btn.active-chord {
            background-color: #0071e3;
            border-color: #0071e3;
            color: white;
        }
        .chord-btn .roman { font-size: 1rem; display: block; }
        .chord-btn .chord-quality { font-size: 0.7rem; opacity: 0.8; display: block; }

        /* コード構成音表示エリア */
        .chord-tones-display {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #f5f5f7;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .chord-tones-label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
        }
        .chord-tones-circles {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .chord-tone-marker {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.75rem;
            color: white;
            box-sizing: border-box;
            line-height: 1;
        }
        .chord-tone-marker.root-note {
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            border: 2px solid #fff;
            transform: scale(1.1);
        }
        .chord-tone-marker .tone-text { display: block; }
        .chord-tone-slash {
            font-size: 1.2rem;
            color: #999;
            font-weight: bold;
        }

        /* コード進行プレイヤー */
        .progression-panel {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            background: #f0f7ff;
            border: 1px solid #b3d7ff;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .progression-panel-title {
            font-size: 0.8rem;
            font-weight: bold;
            color: #004b93;
        }
        .progression-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .progression-btn {
            padding: 7px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid #0071e3;
            border-radius: 20px;
            background: white;
            color: #0071e3;
            cursor: pointer;
            transition: all 0.2s;
        }
        .progression-btn:hover { background: #e8f0fe; }
        .progression-btn.playing {
            background: #0071e3;
            color: white;
        }
        .progression-stop-btn {
            padding: 7px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid #ff3b30;
            border-radius: 20px;
            background: white;
            color: #ff3b30;
            cursor: pointer;
            display: none;
        }
        .progression-stop-btn:hover { background: #fff0ef; }
        .progression-sequence {
            font-size: 0.8rem;
            color: #555;
            min-height: 1.2em;
        }
        .progression-sequence .step {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 2px;
            transition: background 0.1s;
        }
        .progression-sequence .step.current-step {
            background: #0071e3;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body class="mode-quiz">

<div class="container">
    <div class="app-header">
        <h1>ギター指板 アドバンスド・トレーナー</h1>
        <div class="header-controls">
            <div class="volume-control">
                <span>🔊 VOL:</span>
                <input type="range" id="volumeSlider" min="0" max="0.5" step="0.05" value="0.2">
            </div>
            <button id="displayToggleBtn" class="display-toggle-btn" onclick="toggleDisplayMode()">表示: 音名</button>
            <button id="modeToggleBtn" class="mode-toggle-btn" onclick="toggleMode()">アナライザーへ</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="row-group">
            <span style="font-size: 0.85rem; font-weight: bold; color: #555;">表示レンジ:</span>
            <button id="range-12" class="switch-btn active" onclick="switchRange(12)">12 フレット</button>
            <button id="range-24" class="switch-btn" onclick="switchRange(24)">24 フレット</button>

            <span style="font-size: 0.85rem; font-weight: bold; color: #555; margin-left: 10px;">チューニング:</span>
            <select id="tuningSelect" class="select-custom" onchange="handleTuningChange()">
                <option value="regular">Regular (1E, 2B, 3G, 4D, 5A, 6E)</option>
                <option value="halfStepDown">Half Step Down (1Eb, 2Bb, 3Gb, 4Db, 5Ab, 6Eb)</option>
                <option value="dropD">Drop D (1E, 2B, 3G, 4D, 5A, 6D)</option>
            </select>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-title">出題する弦を選択</div>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="chk-1" value="1"> 1弦</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-2" value="2"> 2弦</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-3" value="3"> 3弦</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-4" value="4"> 4弦</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-5" value="5" checked> 5弦</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-6" value="6" checked> 6弦</label>
            </div>
        </div>

        <div class="scale-panel" id="scalePanel">
            <div class="settings-title" style="color: #004b93;">演奏スケール一発ナビ</div>
            <div class="row-group">
                <span style="font-size: 0.85rem; font-weight: bold; color: #333;">Key (Root):</span>
                <select id="keySelect" class="select-custom" onchange="applyScaleSelection()">
                    <option value="C">C</option><option value="C#/Db">C# / Db</option><option value="D">D</option>
                    <option value="D#/Eb">D# / Eb</option><option value="E">E</option><option value="F">F</option>
                    <option value="F#/Gb">F# / Gb</option><option value="G">G</option><option value="G#/Ab">G# / Ab</option>
                    <option value="A">A</option><option value="A#/Bb">A# / Bb</option><option value="B">B</option>
                </select>

                <span style="font-size: 0.85rem; font-weight: bold; color: #333; margin-left: 10px;">Scale:</span>
                <select id="scaleSelect" class="select-custom" onchange="applyScaleSelection()">
                    <option value="none">-- 選択解除 --</option>
                    <option value="major">Major Scale (1, 2, 3, 4, 5, 6, 7)</option>
                    <option value="minor">Natural Minor Scale (1, 2, b3, 4, 5, b6, b7)</option>
                    <option value="majorPenta">Major Pentatonic (1, 2, 3, 5, 6)</option>
                    <option value="minorPenta">Minor Pentatonic (1, b3, 4, 5, b7)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="display-area">
        <div id="displayContent" class="question">「スタート」を押してね</div>
    </div>

    <div class="fretboard-wrapper">
        <table>
            <thead id="fretboard-head"></thead>
            <tbody id="fretboard-body"></tbody>
        </table>
    </div>

    <div class="progression-panel" id="progressionPanel">
        <div class="progression-panel-title">▶ コード進行プレイヤー</div>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <div class="progression-btns" id="progressionBtns"></div>
            <button class="progression-stop-btn" id="progressionStopBtn" onclick="stopProgression()">■ 停止</button>
        </div>
        <div class="progression-sequence" id="progressionSequence"></div>
    </div>

    <div class="chord-tones-display" id="chordTonesDisplay">
        <div class="chord-tones-label" id="chordTonesLabel"></div>
        <div class="chord-tones-circles" id="chordTonesCircles"></div>
    </div>

    <div class="chord-grid" id="chordGrid"></div>

    <div class="choices-grid" id="choicesGrid"></div>

    <div id="controlWrapper" class="control-btn-wrapper">
        <button id="actionBtn" class="control-btn" onclick="nextQuestion()">スタート</button>
    </div>
</div>

<script>
    // =====================
    // 定数（音楽データ）
    // =====================
    const chromaticScale = ["C", "C#/Db", "D", "D#/Eb", "E", "F", "F#/Gb", "G", "G#/Ab", "A", "A#/Bb", "B"];
    const allNotes       = ["A", "A#/Bb", "B", "C", "C#/Db", "D", "D#/Eb", "E", "F", "F#/Gb", "G", "G#/Ab"];

    const intervalMap = {
        0: "R", 1: "b2", 2: "2", 3: "b3", 4: "3", 5: "4", 6: "#4/b5", 7: "5", 8: "b6", 9: "6", 10: "b7", 11: "7"
    };
    const noteColors = {
        "A": "#FF3B30", "A#/Bb": "#FF9500", "B": "#FFCC00", "C": "#34C759",
        "C#/Db": "#00C7BE", "D": "#0071e3", "D#/Eb": "#5856D6", "E": "#AF52DE",
        "F": "#FF2D55", "F#/Gb": "#A2845E", "G": "#5AC8FA", "G#/Ab": "#8E8E93"
    };
    const scaleIntervals = {
        major:      [0, 2, 4, 5, 7, 9, 11],
        minor:      [0, 2, 3, 5, 7, 8, 10],
        majorPenta: [0, 2, 4, 7, 9],
        minorPenta: [0, 3, 5, 7, 10]
    };
    const diatonicChordQualities = {
        major: ['maj', 'min', 'min', 'maj', 'maj', 'min', 'dim'],
        minor: ['min', 'dim', 'maj', 'min', 'min', 'maj', 'maj'],
    };
    const chordIntervalMap  = { maj: [0, 4, 7], min: [0, 3, 7], dim: [0, 3, 6] };
    const romanNumeralsBase = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
    const progressionData = {
        major: [
            { name: 'カノン',        degrees: [1,5,6,3,4,1,4,5] },
            { name: '王道',          degrees: [4,5,3,6] },
            { name: 'ii-V-I',       degrees: [2,5,1] },
            { name: 'I-IV-V',       degrees: [1,4,5] },
            { name: 'I-V-vi-IV',    degrees: [1,5,6,4] },
        ],
        minor: [
            { name: '小室',          degrees: [1,7,6,7] },
            { name: 'i-VII-VI-V',   degrees: [1,7,6,5] },
            { name: 'i-iv-VII',     degrees: [1,4,7] },
            { name: 'i-VI-III-VII', degrees: [1,6,3,7] },
        ],
    };
    const tuningPresets = {
        regular:      { 1:{n:"E",o:4}, 2:{n:"B",o:3}, 3:{n:"G",o:3}, 4:{n:"D",o:3}, 5:{n:"A",o:2}, 6:{n:"E",o:2} },
        halfStepDown: { 1:{n:"D#/Eb",o:4}, 2:{n:"A#/Bb",o:3}, 3:{n:"F#/Gb",o:3}, 4:{n:"C#/Db",o:3}, 5:{n:"G#/Ab",o:2}, 6:{n:"D#/Eb",o:2} },
        dropD:        { 1:{n:"E",o:4}, 2:{n:"B",o:3}, 3:{n:"G",o:3}, 4:{n:"D",o:3}, 5:{n:"A",o:2}, 6:{n:"D",o:2} }
    };

    // =====================
    // 状態変数
    // =====================
    let boardData            = {};
    let currentMode          = 'quiz';
    let displayMode          = 'note';  // 'note' | 'interval'
    let maxFretRange         = 12;
    let currentString        = 0;
    let currentFret          = 0;
    let correctAnswer        = "";
    let isAnswered           = false;
    let activeAnalyzerNotes    = new Set();
    let individuallyLitMarkers = new Set();
    let progressionTimers      = [];
    let isProgressionPlaying   = false;
    let currentChordTones      = [];
    let currentChordNotes      = new Set();
    let audioCtx               = null;

    // =====================
    // 初期化
    // =====================
    generateBoardData('regular');
    buildFretboard();
    buildChoiceButtons();

    function buildFretboard() {
        const dotFrets       = [3, 5, 7, 9, 15, 17, 19, 21];
        const doubleDotFrets = [12, 24];

        const trHead = document.createElement('tr');
        trHead.innerHTML = '<th>弦 \\ F</th>';
        for (let f = 0; f <= 24; f++) {
            const cls = [
                dotFrets.includes(f)       ? 'dot-fret'        : '',
                doubleDotFrets.includes(f) ? 'double-dot-fret' : '',
                f > 12                     ? 'extended-fret'   : '',
            ].filter(Boolean).join(' ');
            trHead.innerHTML += `<th id="th-fret-${f}"${cls ? ` class="${cls}"` : ''}>${f}</th>`;
        }
        document.getElementById('fretboard-head').appendChild(trHead);

        const tbody = document.getElementById('fretboard-body');
        for (let s = 1; s <= 6; s++) {
            const tr = document.createElement('tr');
            tr.id = `string-${s}`;
            tr.innerHTML = `<td id="string-label-${s}">${s}弦</td>`;
            for (let f = 0; f <= 24; f++) {
                const td  = document.createElement('td');
                const cls = ['fret-cell',
                    dotFrets.includes(f)       ? 'dot-fret'        : '',
                    doubleDotFrets.includes(f) ? 'double-dot-fret' : '',
                    f > 12                     ? 'extended-fret'   : '',
                ].filter(Boolean).join(' ');
                td.className = cls;
                td.id        = `td-${s}-${f}`;
                td.onclick   = () => handleFretCellClick(s, f);
                td.innerHTML = `<span class="target-marker" id="marker-${s}-${f}"><span class="note-text">●</span><span class="octave"></span></span>`;
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
    }

    function buildChoiceButtons() {
        const grid = document.getElementById('choicesGrid');
        allNotes.forEach(note => {
            const btn     = document.createElement('button');
            btn.className = 'choice-btn';
            btn.id        = `btn-${note.replace('/', '-')}`;
            btn.innerText = note;
            btn.disabled  = true;
            btn.onclick   = () => handleNoteClick(note, btn);
            grid.appendChild(btn);
        });
    }

    // =====================
    // 音声
    // =====================
    function playGuitarNote(noteName, octave) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const noteValues = { C:0, "C#":1, D:2, "D#":3, E:4, F:5, "F#":6, G:7, "G#":8, A:9, "A#":10, B:11 };
        const targetNote = noteName.split('/')[0];
        const frequency  = 440 * Math.pow(2, (noteValues[targetNote] + octave * 12 - (noteValues["A"] + 48)) / 12);
        const masterVol  = parseFloat(document.getElementById('volumeSlider').value);
        if (masterVol === 0) return;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const now  = audioCtx.currentTime;
        osc.type = 'triangle';
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(masterVol, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 1.2);
    }

    // =====================
    // 指板データ生成
    // =====================
    function generateBoardData(tuningKey) {
        const preset = tuningPresets[tuningKey];
        boardData = {};
        for (let s = 1; s <= 6; s++) {
            boardData[s] = [];
            let oct  = preset[s].o;
            let pIdx = chromaticScale.indexOf(preset[s].n);
            for (let f = 0; f <= 24; f++) {
                const noteName = chromaticScale[pIdx];
                if (f > 0 && noteName === "C") oct++;
                boardData[s].push({ n: noteName, o: oct });
                pIdx = (pIdx + 1) % 12;
            }
        }
    }

    // =====================
    // 共通UI
    // =====================

    // モードに応じたDOM表示を一括管理する唯一の関数
    function applyModeUI(mode) {
        const isQuiz = mode === 'quiz';
        document.body.className = isQuiz ? 'mode-quiz' : 'mode-analyzer';
        document.getElementById('modeToggleBtn').innerText         = isQuiz ? 'アナライザーへ' : 'クイズモードへ';
        document.getElementById('settingsPanel').style.display     = isQuiz ? 'block' : 'none';
        document.getElementById('scalePanel').style.display        = isQuiz ? 'none'  : 'block';
        document.getElementById('controlWrapper').style.display    = isQuiz ? 'block' : 'none';
        document.getElementById('choicesGrid').style.display       = 'grid';
        document.getElementById('chordGrid').style.display         = 'none';
        document.getElementById('chordTonesDisplay').style.display = 'none';
        document.getElementById('progressionPanel').style.display  = 'none';
        const dc = document.getElementById('displayContent');
        dc.className = isQuiz ? 'question' : 'analyzer-instruction';
        dc.innerText  = isQuiz
            ? '「スタート」を押してね'
            : '指板を直接押すか、スケールを選んでダイアトニックコードを確認しましょう';
        disableAllChoiceButtons(isQuiz);
    }

    function toggleDisplayMode() {
        displayMode = (displayMode === 'note') ? 'interval' : 'note';
        const btn = document.getElementById('displayToggleBtn');
        btn.innerText = displayMode === 'note' ? '表示: 音名' : '表示: 度数';
        btn.classList.toggle('active', displayMode === 'interval');
        if (currentMode === 'analyzer') {
            updateAnalyzerMarkers();
            if (currentChordTones.length > 0) renderChordToneCircles();
        } else if (isAnswered) {
            updateMarkerContent(
                document.getElementById(`marker-${currentString}-${currentFret}`),
                boardData[currentString][currentFret]
            );
        }
    }

    function updateMarkerContent(marker, data) {
        if (displayMode === 'interval') {
            const key      = document.getElementById('keySelect').value;
            const steps    = (chromaticScale.indexOf(data.n) - chromaticScale.indexOf(key) + 12) % 12;
            const interval = intervalMap[steps];
            marker.querySelector('.note-text').innerText = interval;
            marker.querySelector('.octave').innerText    = '';
            marker.classList.toggle('root-note', interval === "R");
        } else {
            marker.querySelector('.note-text').innerText = data.n;
            marker.querySelector('.octave').innerText    = data.o;
            marker.classList.remove('root-note');
        }
    }

    function resetAll() {
        stopProgression();
        activeAnalyzerNotes.clear();
        individuallyLitMarkers.clear();
        currentChordTones = [];
        currentChordNotes = new Set();
        document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active-chord'));
        document.getElementById('chordTonesDisplay').style.display = 'none';
        document.getElementById('chordTonesCircles').innerHTML     = '';
        for (let s = 1; s <= 6; s++) {
            for (let f = 0; f <= 24; f++) {
                const m = document.getElementById(`marker-${s}-${f}`);
                m.style.visibility      = 'hidden';
                m.style.backgroundColor = '';
                m.className             = 'target-marker';
                m.querySelector('.note-text').innerText = '●';
                m.querySelector('.octave').innerText    = '';
            }
        }
        document.querySelectorAll('.choice-btn').forEach(b => {
            b.className = 'choice-btn'; b.style.backgroundColor = ''; b.style.color = '';
        });
    }

    function getRomanNumeral(index, quality) {
        const base = romanNumeralsBase[index];
        if (quality === 'min') return base.toLowerCase();
        if (quality === 'dim') return base.toLowerCase() + '°';
        return base;
    }
    function disableAllChoiceButtons(d) { document.querySelectorAll('.choice-btn').forEach(b => b.disabled = d); }
    function toggleCheckboxes(d)        { for (let s = 1; s <= 6; s++) document.getElementById(`chk-${s}`).disabled = d; }

    // =====================
    // モード・設定切替
    // =====================
    function toggleMode() {
        currentMode = (currentMode === 'quiz') ? 'analyzer' : 'quiz';
        applyModeUI(currentMode);
        resetAll();
        if (currentMode === 'analyzer') document.getElementById('scaleSelect').value = 'none';
    }

    function switchRange(range) {
        maxFretRange = range;
        document.getElementById('range-12').classList.toggle('active', range === 12);
        document.getElementById('range-24').classList.toggle('active', range === 24);
        document.querySelectorAll('.extended-fret').forEach(el =>
            el.style.display = (range === 24) ? 'table-cell' : 'none'
        );
        resetAll();
        if (currentMode === 'quiz') {
            document.getElementById('displayContent').innerText    = '「スタート」を押してね';
            document.getElementById('actionBtn').style.visibility = 'visible';
            disableAllChoiceButtons(true);
        } else {
            applyScaleSelection();
        }
    }

    function handleTuningChange() {
        generateBoardData(document.getElementById('tuningSelect').value);
        resetAll();
        if (currentMode === 'quiz') {
            document.getElementById('displayContent').innerText    = '「スタート」を押してね';
            document.getElementById('actionBtn').style.visibility = 'visible';
            document.getElementById('actionBtn').innerText        = 'スタート';
            disableAllChoiceButtons(true);
        } else {
            applyScaleSelection();
        }
    }

    // =====================
    // クイズモード
    // =====================
    function nextQuestion() {
        const selected = [];
        for (let s = 1; s <= 6; s++) if (document.getElementById(`chk-${s}`).checked) selected.push(s);
        if (selected.length === 0) return alert("弦を選んでください");
        isAnswered = false;
        resetAll();
        currentString = selected[Math.floor(Math.random() * selected.length)];
        currentFret   = Math.floor(Math.random() * (maxFretRange + 1));
        correctAnswer = boardData[currentString][currentFret].n;
        document.getElementById('displayContent').innerText    = `${currentString}弦 ${currentFret}フレット`;
        document.getElementById('actionBtn').style.visibility = 'hidden';
        const m = document.getElementById(`marker-${currentString}-${currentFret}`);
        m.style.backgroundColor = '#0071e3';
        m.classList.add('visible-on');
        toggleCheckboxes(true);
        disableAllChoiceButtons(false);
    }

    function checkAnswer(selected, btn) {
        if (isAnswered) return;
        if (selected === correctAnswer) {
            isAnswered = true;
            btn.classList.add('correct');
            const m    = document.getElementById(`marker-${currentString}-${currentFret}`);
            const data = boardData[currentString][currentFret];
            m.style.backgroundColor = noteColors[data.n];
            updateMarkerContent(m, data);
            m.classList.add('visible-on');
            playGuitarNote(data.n, data.o);
            disableAllChoiceButtons(true);
            document.getElementById('actionBtn').style.visibility = 'visible';
            document.getElementById('actionBtn').innerText        = '次の問題';
            toggleCheckboxes(false);
        } else {
            btn.classList.add('wrong');
            btn.disabled = true;
        }
    }

    // =====================
    // アナライザーモード
    // =====================
    function handleNoteClick(note, btn) {
        if (currentMode === 'quiz') checkAnswer(note, btn);
        else toggleAnalyzerNote(note, btn);
    }

    function applyScaleSelection() {
        if (currentMode !== 'analyzer') return;
        const key       = document.getElementById('keySelect').value;
        const scaleType = document.getElementById('scaleSelect').value;

        // 状態・UIをリセット
        activeAnalyzerNotes.clear();
        individuallyLitMarkers.clear();
        allNotes.forEach(n => {
            const b = document.getElementById(`btn-${n.replace('/', '-')}`);
            b.style.backgroundColor = ''; b.style.color = '';
        });
        document.getElementById('chordGrid').style.display         = 'none';
        document.getElementById('chordGrid').innerHTML             = '';
        document.getElementById('chordTonesDisplay').style.display  = 'none';
        document.getElementById('progressionPanel').style.display   = 'none';
        document.getElementById('choicesGrid').style.display       = 'grid';

        if (scaleType === 'none') { updateAnalyzerMarkers(); return; }

        // スケール音の収集とボタン着色
        const intervals = scaleIntervals[scaleType];
        const startIdx  = chromaticScale.indexOf(key);
        intervals.forEach(interval => {
            const noteName = chromaticScale[(startIdx + interval) % 12];
            activeAnalyzerNotes.add(noteName);
            const btn = document.getElementById(`btn-${noteName.replace('/', '-')}`);
            if (btn) { btn.style.backgroundColor = noteColors[noteName]; btn.style.color = 'white'; }
        });

        // スケールアルペジオ再生
        let delay = 0;
        for (let s = 6; s >= 1; s--) {
            for (let f = 0; f <= maxFretRange; f++) {
                if (activeAnalyzerNotes.has(boardData[s][f].n)) {
                    setTimeout(() => playGuitarNote(boardData[s][f].n, boardData[s][f].o), delay);
                    delay += 60; break;
                }
            }
        }

        if (diatonicChordQualities[scaleType]) {
            buildChordButtons(scaleType, startIdx, intervals);
            buildProgressionPanel(scaleType);
        }

        updateAnalyzerMarkers();
    }

    function buildChordButtons(scaleType, startIdx, intervals) {
        const qualities = diatonicChordQualities[scaleType];
        const chordGrid = document.getElementById('chordGrid');
        chordGrid.style.display = 'grid';
        document.getElementById('choicesGrid').style.display = 'none';

        qualities.forEach((quality, i) => {
            const rootNote     = chromaticScale[(startIdx + intervals[i]) % 12];
            const roman        = getRomanNumeral(i, quality);
            const qualityLabel = { maj: 'Maj', min: 'min', dim: 'dim' }[quality];
            const btn          = document.createElement('button');
            btn.className = 'chord-btn';
            btn.id        = `chord-btn-${i}`;
            btn.innerHTML = `<span class="roman">${roman}</span><span class="chord-quality">${rootNote} ${qualityLabel}</span>`;
            btn.onclick   = () => { stopProgression(); handleChordClick(i, rootNote, quality, roman); };
            chordGrid.appendChild(btn);
        });
    }

    function buildProgressionPanel(scaleType) {
        const btnsEl = document.getElementById('progressionBtns');
        btnsEl.innerHTML = '';
        document.getElementById('progressionSequence').innerHTML = '';
        (progressionData[scaleType] || []).forEach(prog => {
            const btn        = document.createElement('button');
            btn.className    = 'progression-btn';
            btn.dataset.name = prog.name;
            btn.innerText    = prog.name;
            btn.onclick      = () => playProgression(prog.name, prog.degrees, scaleType);
            btnsEl.appendChild(btn);
        });
        document.getElementById('progressionPanel').style.display = 'flex';
    }

    function handleChordClick(index, rootNote, quality, roman) {
        document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('active-chord'));
        document.getElementById(`chord-btn-${index}`).classList.add('active-chord');

        const rootIdx = chromaticScale.indexOf(rootNote);
        chordIntervalMap[quality].forEach((interval, i) => {
            const note = chromaticScale[(rootIdx + interval) % 12];
            setTimeout(() => playGuitarNote(note, 3), i * 80);
        });

        currentChordTones = chordIntervalMap[quality].map((interval, i) => ({
            note: chromaticScale[(rootIdx + interval) % 12], isRoot: i === 0
        }));
        currentChordNotes = new Set(currentChordTones.map(t => t.note));

        document.getElementById('chordTonesDisplay').style.display = 'flex';
        document.getElementById('chordTonesLabel').innerText =
            `${roman}  (${rootNote} ${{ maj: 'Major', min: 'minor', dim: 'dim' }[quality]})`;
        renderChordToneCircles();
        updateAnalyzerMarkers();
    }

    function renderChordToneCircles() {
        const container  = document.getElementById('chordTonesCircles');
        container.innerHTML = '';
        const keyRootIdx = chromaticScale.indexOf(document.getElementById('keySelect').value);

        currentChordTones.forEach((tone, i) => {
            if (i > 0) {
                const slash     = document.createElement('span');
                slash.className = 'chord-tone-slash';
                slash.innerText = '/';
                container.appendChild(slash);
            }
            const circle                  = document.createElement('span');
            circle.className              = 'chord-tone-marker' + (tone.isRoot ? ' root-note' : '');
            circle.style.backgroundColor  = noteColors[tone.note];
            const steps                   = (chromaticScale.indexOf(tone.note) - keyRootIdx + 12) % 12;
            const label                   = displayMode === 'interval' ? intervalMap[steps] : tone.note;
            circle.innerHTML              = `<span class="tone-text">${label}</span>`;
            container.appendChild(circle);
        });
    }

    function toggleAnalyzerNote(note, btn) {
        if (activeAnalyzerNotes.has(note)) {
            activeAnalyzerNotes.delete(note);
            btn.style.backgroundColor = ''; btn.style.color = '';
            for (let s = 1; s <= 6; s++)
                for (let f = 0; f <= 24; f++)
                    if (boardData[s][f].n === note) individuallyLitMarkers.delete(`${s}-${f}`);
        } else {
            activeAnalyzerNotes.add(note);
            btn.style.backgroundColor = noteColors[note]; btn.style.color = 'white';
            for (let s = 1; s <= 6; s++)
                for (let f = 0; f <= maxFretRange; f++)
                    if (boardData[s][f].n === note) playGuitarNote(boardData[s][f].n, boardData[s][f].o);
        }
        updateAnalyzerMarkers();
    }

    function updateAnalyzerMarkers() {
        for (let s = 1; s <= 6; s++) {
            for (let f = 0; f <= maxFretRange; f++) {
                const m = document.getElementById(`marker-${s}-${f}`);
                const d = boardData[s][f];
                if (activeAnalyzerNotes.has(d.n) || individuallyLitMarkers.has(`${s}-${f}`)) {
                    updateMarkerContent(m, d);
                    m.style.backgroundColor = noteColors[d.n];
                    m.classList.add('visible-on');
                    m.classList.toggle('dimmed', currentChordNotes.size > 0 && !currentChordNotes.has(d.n));
                } else {
                    m.style.backgroundColor = '';
                    m.classList.remove('visible-on', 'root-note', 'dimmed');
                    m.querySelector('.note-text').innerText = '●';
                    m.querySelector('.octave').innerText    = '';
                }
            }
        }
    }

    function handleFretCellClick(string, fret) {
        if (currentMode !== 'analyzer') return;
        const key = `${string}-${fret}`;
        if (individuallyLitMarkers.has(key)) individuallyLitMarkers.delete(key);
        else {
            individuallyLitMarkers.add(key);
            playGuitarNote(boardData[string][fret].n, boardData[string][fret].o);
        }
        updateAnalyzerMarkers();
    }

    // =====================
    // 進行プレイヤー
    // =====================
    function playProgression(progName, degrees, scaleType) {
        stopProgression();
        isProgressionPlaying = true;

        const key       = document.getElementById('keySelect').value;
        const startIdx  = chromaticScale.indexOf(key);
        const intervals = scaleIntervals[scaleType];
        const qualities = diatonicChordQualities[scaleType];

        document.getElementById('progressionSequence').innerHTML = degrees.map((d, i) =>
            `<span class="step" id="prog-step-${i}">${getRomanNumeral(d - 1, qualities[d - 1])}</span>`
        ).join(' → ');

        document.getElementById('progressionStopBtn').style.display = 'inline-block';
        document.querySelectorAll('.progression-btn').forEach(b => b.classList.remove('playing'));
        document.querySelector(`.progression-btn[data-name="${progName}"]`).classList.add('playing');

        const msPerChord = 1600;
        degrees.forEach((degree, i) => {
            progressionTimers.push(setTimeout(() => {
                if (!isProgressionPlaying) return;
                document.querySelectorAll('#progressionSequence .step').forEach(s => s.classList.remove('current-step'));
                document.getElementById(`prog-step-${i}`)?.classList.add('current-step');
                const idx      = degree - 1;
                const rootNote = chromaticScale[(startIdx + intervals[idx]) % 12];
                const quality  = qualities[idx];
                handleChordClick(idx, rootNote, quality, getRomanNumeral(idx, quality));
            }, i * msPerChord));
        });
        progressionTimers.push(setTimeout(() => stopProgression(), degrees.length * msPerChord + 200));
    }

    function stopProgression() {
        progressionTimers.forEach(t => clearTimeout(t));
        progressionTimers    = [];
        isProgressionPlaying = false;
        document.getElementById('progressionStopBtn').style.display = 'none';
        document.querySelectorAll('.progression-btn').forEach(b => b.classList.remove('playing'));
        document.querySelectorAll('#progressionSequence .step').forEach(s => s.classList.remove('current-step'));
    }
</script>
